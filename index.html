<!DOCTYPE html>
<html>
<head>
  <title>Coming Soon</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      background: #f9f9f9; /* light white background */
      font-family: 'mainlux', Roboto;
    }

    .container {
      display: flex;
      height: 100vh;
    }

    /* LEFT SIDE (COMING SOON) */
    .left {
      width: 80px;
      display: flex;
      justify-content: center;
      align-items: center;
      margin-left:20px;

    }

    .vertical-text {
      transform: rotate(-90deg);
      font-size: 26px;
      font-weight: bold;
      letter-spacing: 3px;
       /*color: #0c3c4c; dark teal like your image */
      background: linear-gradient(180deg, #a60031, #cb9a38);
  -webkit-background-clip: text;
  background-clip: text;              /* important */
  -webkit-text-fill-color: transparent;
  color: transparent;    
      white-space: nowrap;
    }

    /* RIGHT SIDE BOX */
    .right {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .box {
      width: 80%;
      max-width: 900px;
      height: 300px;
      background: white;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      display: flex;
      justify-content: center;
      align-items: center; 
      position:relative;
      border-radius: 12px;
    }

    /* LOGO INSIDE BOX */
    .box img {
      max-width: 200px;
      width: 60%;
    }
.box::before {
  content: "";
  position: absolute;

  left: -40px; /* distance from box */
  top: 0;

  width: 2px;
  height: 100%; /* 🔥 matches box height exactly */

  background: linear-gradient(to bottom, #a60031, #cb9a38);
}
    /* MOBILE RESPONSIVE */
    @media (max-width: 768px) {
      .container {
        flex-direction: column;
      }

      .left {
        height: 100px;
        width: 100%;
      }

      .vertical-text {
        transform: rotate(0deg);
        font-size:20px;

      }

      .box {
        width: 90%;
        height: 200px;
      }
      .box::before {
    left: 50%;
    top: -40px;

    width: 60px;
    height: 2px;

    transform: translateX(-50%);

    background: linear-gradient(to right, #a60031, #cb9a38);
      }
    }
  </style>
</head>

<body>

<div class="container">

  <!-- LEFT SIDE -->
  <div class="left">
    <div class="vertical-text">COMING SOON Ruth Design</div>
    <div class="line"></div>
  </div>

  <!-- RIGHT SIDE -->
  <div class="right">
    <div class="box">
      <!-- YOUR LOGO HERE -->
      <img src="Ruth-Designs-Logo-Transparent.png" alt="Logo">
    </div>
  </div>

</div>

</body>
</html></html>
