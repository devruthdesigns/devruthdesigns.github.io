<!DOCTYPE html>
<html>
<head>
  <title>Coming Soon</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: black;
    }

    video {
      position: fixed;
      top: 0;
      left: 0;
      min-width: 100%;
      min-height: 100%;
      object-fit: cover;
    }

   /* .fallback {
      position: fixed;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
    } */
  </style>
</head>

<body>

  <!-- VIDEO -->
  <video autoplay muted loop playsinline>
    <source src="coming-soon.mp4" type="video/mp4">
  </video>

  <!-- FALLBACK IMAGE -->
   <!--  <img src="coming-soon.jpg" class="fallback" id="fallbackImage">  -->

  <script>
    const video = document.querySelector("video");
    const fallback = document.getElementById("fallbackImage");

    video.onerror = function() {
      video.style.display = "none";
      fallback.style.display = "block";
    };
  </script>

</body>
</html>
